name: Update Game Data

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Update game data
        run: npm run update-data

      - name: Create pull request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore(data): update game-data.json'
          title: 'chore(data): update game-data.json'
          body: 'Automated update via `npm run update-data`.'
          branch: data/update-game-data
          delete-branch: true
          labels: data
