name: Feature Request
description: Suggest an idea for Forge
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: "Thanks for suggesting an idea!"
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: What alternatives have you considered?
  - type: checkboxes
    id: checks
    attributes:
      label: Verification
      options:
        - label: I have searched existing issues for this request
          required: true
